<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../../style.css">
    <title>Apple Park wallpapers</title>
    <style>
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .gallery a {
            display: block;
            width: 160px;
        }

        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #444;
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <header>
        <h1>Apple Park</h1>
        <p>Tap a thumbnail to open the full image, then long-press to save on mobile.</p>
    </header>

    <div class="gallery">
        <a href="A-Mountain-View-at-Apple-Park-wallpaper-for-Mac.png"><img
                src="A-Mountain-View-at-Apple-Park-wallpaper-for-Mac.png" alt="Mountain View"></a>
        <a href="Apple-Park-iPad-wallpaper-Walk-in-the-Park.png"><img
                src="Apple-Park-iPad-wallpaper-Walk-in-the-Park.png" alt="Walk in the Park"></a>
        <a href="Apple-Park-iPhone-wallpaper-Day-AppleTLDR.png"><img src="Apple-Park-iPhone-wallpaper-Day-AppleTLDR.png"
                alt="Apple Park iPhone"></a>
        <a href="Apple-Park-illustration-wallpaper-for-Mac-at-Night-by-AppleTLDR.png"><img
                src="Apple-Park-illustration-wallpaper-for-Mac-at-Night-by-AppleTLDR.png"
                alt="Park illustration night"></a>
        <a href="Apple-Park-wallpaper-for-iPhone-Clouds.png"><img src="Apple-Park-wallpaper-for-iPhone-Clouds.png"
                alt="Clouds"></a>
    </div>

    <footer>
        <p>Long-press images to save on a mobile device.</p>
    </footer>
</body>

</html>
